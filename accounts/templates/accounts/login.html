{% extends 'landing/base.html' %}
{% block content %}
<div class="container" style="max-width: 460px; padding: 4rem 1rem;">
    <div class="panel panel-accent">
        <h2 class="text-center" style="margin-bottom: 0.5rem;">تسجيل الدخول</h2>
        <form method="post" action="{% url 'accounts:login' %}" style="display: flex; flex-direction: column; gap: 1.25rem;">
            {% csrf_token %}
            <div class="field">
                <label>رقم الواتساب</label>
                <input type="text" name="whatsapp" placeholder="01xxxxxxxxx" required>
            </div>
            <div class="field">
                <label>كلمة المرور</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">تسجيل الدخول</button>
        </form>
        <p class="text-center" style="margin-top: 1rem; color: var(--muted);">ليس لديك حساب؟ <a href="{% url 'accounts:signup' %}">إنشاء حساب جديد</a></p>
    </div>
</div>
{% endblock %}
