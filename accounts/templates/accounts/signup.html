{% extends 'landing/base.html' %}
{% block content %}
<div class="container" style="max-width: 460px; padding: 4rem 1rem;">
    <div class="panel panel-accent">
        <h2 class="text-center" style="margin-bottom: 0.5rem;">إنشاء حساب جديد</h2>
        <form method="post" action="{% url 'accounts:signup' %}" style="display: flex; flex-direction: column; gap: 1.25rem;">
            {% csrf_token %}
            <div class="field">
                <label>الاسم بالكامل</label>
                <input type="text" name="name" required>
            </div>
            <div class="field">
                <label>رقم الواتساب (متضمن كود الدولة مثل 2010...)</label>
                <input type="text" name="whatsapp" placeholder="مثال: 201xxxxxxxxx" required>
            </div>
            <div class="field">
                <label>كلمة المرور</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">تسجيل الحساب</button>
        </form>
        <p class="text-center" style="margin-top: 1rem; color: var(--muted);">لديك حساب بالفعل؟ <a href="{% url 'accounts:login' %}">سجل دخول</a></p>
    </div>
</div>
{% endblock %}
