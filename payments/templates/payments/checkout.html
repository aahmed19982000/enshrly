{% extends 'landing/base.html' %}
{% block content %}
<div class="page-shell-body" style="max-width: 480px; margin: 0 auto; padding: 3rem 1rem;">
    <h1 class="page-shell-title">إتمام الدفع</h1>

    <div class="panel panel-accent">
        <span class="card-title">ملخص الباقة</span>
        <div style="display: flex; justify-content: space-between;">
            <span style="font-weight: 700; color: var(--text);">{{ package.name }}</span>
            <span style="font-family: var(--font-display); font-weight: 700; color: var(--gold);" id="display-price">${{ package.price }}</span>
        </div>
        <span style="color: var(--muted); font-size: 0.85rem;">نشر حتى {{ package.daily_limit }} مقال يومياً</span>
    </div>

    <form method="post" action="{% url 'payments:checkout' package.id %}" style="display: flex; flex-direction: column; gap: 1.25rem;">
        {% csrf_token %}

        <div class="panel">
            <span class="card-title">العملة</span>
            <div style="display: flex; gap: 0.75rem;">
                <label class="toggle-chip selected">
                    <input type="radio" name="currency" value="USD" checked onchange="updatePrice({{ package.price }}, 'USD')">
                    دولار (USD)
                </label>
                <label class="toggle-chip">
                    <input type="radio" name="currency" value="EGP" onchange="updatePrice({{ package.price_egp }}, 'EGP')">
                    جنيه مصري (EGP)
                </label>
            </div>
        </div>

        <div class="panel">
            <span class="card-title">طريقة الدفع</span>

            <label id="paypal-opt" class="select-row selected">
                <input type="radio" name="gateway" id="gw-paypal" value="paypal" required onclick="togglePhoneInput(false)">
                <span class="select-row-label">PayPal / بطاقة ائتمانية دولية</span>
            </label>

            <label id="paymob-opt" class="select-row" style="display: none;">
                <input type="radio" name="gateway" id="gw-paymob" value="paymob" onclick="togglePhoneInput(false)">
                <span class="select-row-label">البطاقات البنكية المصرية (Visa / Mastercard / Meeza)</span>
            </label>

            <label id="local-opt" class="select-row" style="display: none;">
                <input type="radio" name="gateway" id="gw-local" value="local" onclick="togglePhoneInput(true)">
                <span class="select-row-label">محافظ محلية (Vodafone Cash / فوري)</span>
            </label>

            <div id="phone-input-group" class="field" style="display: none;">
                <label for="sender_phone">رقم المحفظة التي ستحول منها:</label>
                <input type="text" name="sender_phone" id="sender_phone" placeholder="مثال: 01012345678" style="direction: ltr; text-align: left;">
                <span class="help-text">يُساعدنا هذا في تأكيد عمليتك تلقائياً وبسرعة فور التحويل.</span>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">متابعة الدفع</button>
    </form>
</div>

<script>
function updatePrice(amount, currency) {
    const display = document.getElementById('display-price');

    const paypalOpt = document.getElementById('paypal-opt');
    const paymobOpt = document.getElementById('paymob-opt');
    const localOpt = document.getElementById('local-opt');

    const gwPaypal = document.getElementById('gw-paypal');
    const gwPaymob = document.getElementById('gw-paymob');
    const gwLocal = document.getElementById('gw-local');

    if (currency === 'USD') {
        display.innerText = '$' + amount;

        paypalOpt.style.display = 'block';
        paymobOpt.style.display = 'none';
        localOpt.style.display = 'none';

        gwPaypal.required = true;
        gwPaypal.checked = true;
        gwPaymob.required = false;
        gwPaymob.checked = false;
        gwLocal.required = false;
        gwLocal.checked = false;

        togglePhoneInput(false);
    } else {
        display.innerText = amount + ' ج.م';

        paypalOpt.style.display = 'none';
        paymobOpt.style.display = 'block';
        localOpt.style.display = 'block';

        gwPaypal.required = false;
        gwPaypal.checked = false;

        gwPaymob.required = true;
        gwPaymob.checked = true;
        gwLocal.required = false;
        gwLocal.checked = false;

        togglePhoneInput(false);
    }
}

function togglePhoneInput(show) {
    const group = document.getElementById('phone-input-group');
    const input = document.getElementById('sender_phone');
    if (show) {
        group.style.display = 'block';
        input.setAttribute('required', 'required');
    } else {
        group.style.display = 'none';
        input.removeAttribute('required');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    updatePrice({{ package.price }}, 'USD');
});
</script>
{% endblock %}
