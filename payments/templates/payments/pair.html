{% extends 'landing/base.html' %}
{% block content %}
<div class="page-shell-body" style="max-width: 420px; margin: 0 auto; padding: 3rem 1rem;">
    <h1 class="page-shell-title">اربط تطبيق الجوال</h1>

    <div class="panel panel-accent text-center" style="align-items: center;">
        <span style="color: var(--muted); font-size: 0.9rem;">افتح تطبيق إنشرلي على جوالك وامسح الكود التالي</span>
        <div style="background: #fff; padding: 1rem; border-radius: var(--radius-sm); display: inline-block;">
            <img src="data:image/png;base64,{{ qr_base64 }}" alt="Pairing QR Code" style="display: block; max-width: 100%; height: auto;">
        </div>
    </div>

    <div class="panel">
        <span class="card-title">عنوان الخادم المكتشف</span>
        <div class="mono-block">{{ server_url }}</div>
    </div>
</div>
{% endblock %}
