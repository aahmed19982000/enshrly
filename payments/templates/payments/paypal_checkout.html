{% extends 'landing/base.html' %}
{% block content %}
<div class="page-shell-body" style="max-width: 440px; margin: 0 auto; padding: 3rem 1rem;">
    <h1 class="page-shell-title">الدفع عبر PayPal</h1>

    <div class="panel panel-accent">
        <span class="card-title">ملخص الطلب</span>
        <div style="display: flex; justify-content: space-between;">
            <span style="font-weight: 700; color: var(--text);">{{ package.name }}</span>
            <span style="font-family: var(--font-display); font-weight: 700; color: var(--gold);">${{ transaction.amount }} USD</span>
        </div>
        <span style="color: var(--muted); font-size: 0.85rem;">الحد اليومي للنشر: {{ package.daily_limit }} مقال</span>
    </div>

    <div class="panel" style="align-items: center;">
        <div id="paypal-button-container" style="width: 100%;"></div>

        <div id="loading-indicator" style="display: none; text-align: center;">
            <div class="spinner" style="margin-bottom: 1rem;"></div>
            <p style="margin: 0; font-weight: 700; color: var(--text);">جارٍ تأكيد عملية الدفع وتوليد الكود الخاص بك… يرجى عدم إغلاق الصفحة.</p>
        </div>

        <div id="error-message" style="display: none; width: 100%; background: var(--rust-tint); border: 1px solid var(--rule); color: var(--rust); padding: 0.9rem 1.1rem; border-radius: var(--radius-sm); text-align: center;"></div>
    </div>

    <div class="text-center">
        <a href="{% url 'payments:packages' %}" style="color: var(--muted); font-size: 0.9rem;">← إلغاء والعودة للباقات</a>
    </div>
</div>

<!-- استدعاء SDK الخاص بباي بال -->
<script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=USD&disable-funding=card,credit"></script>

<script>
paypal.Buttons({
    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: '{{ transaction.amount }}'
                },
                description: 'باقة نشر: {{ package.name }}'
            }]
        });
    },
    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            document.getElementById('paypal-button-container').style.display = 'none';
            document.getElementById('loading-indicator').style.display = 'block';
            document.getElementById('error-message').style.display = 'none';

            fetch("{% url 'payments:confirm_paypal_payment' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({
                    orderID: data.orderID,
                    transactionID: "{{ transaction.transaction_id }}"
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect_url;
                } else {
                    document.getElementById('paypal-button-container').style.display = 'block';
                    document.getElementById('loading-indicator').style.display = 'none';
                    const errorDiv = document.getElementById('error-message');
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            })
            .catch(err => {
                document.getElementById('paypal-button-container').style.display = 'block';
                document.getElementById('loading-indicator').style.display = 'none';
                const errorDiv = document.getElementById('error-message');
                errorDiv.innerText = "حدث خطأ غير متوقع أثناء الاتصال بالخادم الرئيسي.";
                errorDiv.style.display = 'block';
            });
        });
    },
    onError: function(err) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.innerText = "فشلت عملية الدفع أو تم إلغاؤها عبر بوابة PayPal.";
        errorDiv.style.display = 'block';
    }
}).render('#paypal-button-container');
</script>
{% endblock %}
