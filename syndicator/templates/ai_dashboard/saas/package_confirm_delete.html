{% extends 'ai_dashboard/base.html' %}
{% block header_title %}حذف الباقة{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto glass-panel p-8 text-center">
    <div class="w-20 h-20 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fa-solid fa-triangle-exclamation text-4xl"></i>
    </div>
    
    <h3 class="text-2xl font-bold text-white mb-2">تأكيد حذف الباقة</h3>
    <p class="text-slate-400 mb-8">هل أنت متأكد من أنك تريد حذف الباقة "<span class="text-white font-bold">{{ object.name }}</span>"؟ لن تتمكن من التراجع عن هذا الإجراء، ولن تظهر للعملاء بعد الآن.</p>

    <form method="post" class="flex justify-center space-x-4 space-x-reverse">
        {% csrf_token %}
        <a href="{% url 'news_ai:saas_packages' %}" class="px-6 py-2 rounded-xl text-slate-300 hover:text-white hover:bg-slate-800 transition duration-200">إلغاء</a>
        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-8 py-2 rounded-xl font-bold transition duration-200 shadow-lg shadow-red-500/30">نعم، احذف الباقة</button>
    </form>
</div>
{% endblock %}
