{% load i18n %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "تسجيل الدخول" %} | Enshrly</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-panel p-8 rounded-3xl shadow-2xl">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-teal-500/10 border border-teal-500/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">{% trans "تسجيل الدخول" %}</h1>
            <p class="text-sm text-slate-400">لوحة تحكم خدمات النشر والتوليد الذكي Enshrly</p>
        </div>

        <!-- Form Errors -->
        {% if form.errors %}
            <div class="bg-rose-500/10 border border-rose-500/20 text-rose-300 p-4 mb-6 rounded-2xl text-sm text-center">
                {% trans "اسم المستخدم أو كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى." %}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="post" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            {% if request.GET.next %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
            {% endif %}

            <!-- Username Field -->
            <div class="space-y-2">
                <label for="id_username" class="block text-sm font-semibold text-slate-300">{% trans "اسم المستخدم" %}</label>
                <input type="text" name="username" id="id_username" placeholder="{% trans "اسم المستخدم الخاص بك" %}" 
                       class="block w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent text-slate-200 placeholder-slate-600 transition duration-150" 
                       required autofocus>
            </div>

            <!-- Password Field -->
            <div class="space-y-2">
                <label for="id_password" class="block text-sm font-semibold text-slate-300">{% trans "كلمة المرور" %}</label>
                <input type="password" name="password" id="id_password" placeholder="••••••••" 
                       class="block w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent text-slate-200 placeholder-slate-600 transition duration-150" 
                       required>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full py-3.5 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-teal-500/20 transition duration-150">
                {% trans "دخول" %}
            </button>
        </form>
    </div>

</body>
</html>
